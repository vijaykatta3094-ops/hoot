<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <!-- "Toasty" — Warm cream bg, brown owl, teal waves -->

  <rect width="300" height="340" rx="48" fill="#FEF3C7"/>

  <!-- Ear tufts (rounded, cute) -->
  <path d="M 88,96 Q 74,68 83,50 Q 95,65 112,90 Z" fill="#78350F"/>
  <path d="M 212,96 Q 226,68 217,50 Q 205,65 188,90 Z" fill="#78350F"/>

  <!-- Head -->
  <circle cx="150" cy="132" r="76" fill="#78350F"/>

  <!-- Face disc -->
  <ellipse cx="150" cy="136" rx="57" ry="60" fill="#92400E"/>

  <!-- Left eye -->
  <circle cx="122" cy="122" r="26" fill="#F97316"/>
  <circle cx="122" cy="122" r="16" fill="#431407"/>
  <circle cx="130" cy="114" r="7" fill="white" opacity="0.95"/>

  <!-- Right eye -->
  <circle cx="178" cy="122" r="26" fill="#F97316"/>
  <circle cx="178" cy="122" r="16" fill="#431407"/>
  <circle cx="186" cy="114" r="7" fill="white" opacity="0.95"/>

  <!-- Blush (cute!) -->
  <circle cx="98"  cy="150" r="16" fill="#FCA5A5" opacity="0.50"/>
  <circle cx="202" cy="150" r="16" fill="#FCA5A5" opacity="0.50"/>

  <!-- Open beak -->
  <path d="M 139,158 Q 150,150 161,158 L 157,168 Q 150,163 143,168 Z" fill="#D97706"/>
  <path d="M 143,171 Q 150,181 157,171 L 154,178 Q 150,182 146,178 Z" fill="#B45309"/>
  <ellipse cx="150" cy="169" rx="9" ry="4" fill="#431407" opacity="0.55"/>

  <!-- Sound waves -->
  <path d="M 167,154 C 180,154 180,176 167,176"
        stroke="#0D9488" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 173,147 C 193,147 193,183 173,183"
        stroke="#0D9488" stroke-width="3"   fill="none" stroke-linecap="round" opacity="0.72"/>
  <path d="M 179,140 C 206,140 206,190 179,190"
        stroke="#0D9488" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.42"/>

  <!-- Body -->
  <ellipse cx="150" cy="232" rx="53" ry="44" fill="#78350F"/>

  <!-- Cute belly patch -->
  <ellipse cx="150" cy="238" rx="29" ry="30" fill="#92400E" opacity="0.55"/>

  <!-- Wing shading -->
  <path d="M 108,218 Q 95,233 99,251"  stroke="#5C2409" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 118,230 Q 105,245 109,260" stroke="#5C2409" stroke-width="9"  fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 192,218 Q 205,233 201,251" stroke="#5C2409" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 182,230 Q 195,245 191,260" stroke="#5C2409" stroke-width="9"  fill="none" stroke-linecap="round" opacity="0.55"/>

  <!-- Feet -->
  <line x1="126" y1="268" x2="109" y2="289" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="128" y1="270" x2="120" y2="293" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="131" y1="268" x2="135" y2="291" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="174" y1="268" x2="191" y2="289" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="172" y1="270" x2="180" y2="293" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="169" y1="268" x2="165" y2="291" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>

  <text x="150" y="328" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="800" letter-spacing="10" fill="#78350F">HOOT</text>
</svg>
